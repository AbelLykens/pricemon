upstream pricemon_app {
    server unix:/run/pricemon/gunicorn.sock fail_timeout=0;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # TLS terminated by upstream LB; only HTTP here.
    client_max_body_size 1m;

    access_log /var/log/nginx/pricemon-access.log;
    error_log  /var/log/nginx/pricemon-error.log warn;

    location /static/ {
        alias /opt/pricemon/staticfiles/;
        expires 1h;
        access_log off;
    }

    location / {
        proxy_pass http://pricemon_app;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_redirect   off;
        proxy_read_timeout 30s;
    }
}
