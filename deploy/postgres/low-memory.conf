# Pricemon Postgres tuning for a ~1 GB total-RAM host.
#
# Drop this file at /etc/postgresql/17/main/conf.d/pricemon-lean.conf
# (the conf.d include is enabled by default on Debian's packaging) and
# restart postgresql.
#
# Targets the fallback profile in INSTALLING.md: <=6 feed daemons + 1
# gunicorn worker, so ~10-15 long-lived backends with very small queries.
# Do NOT use this on the primary host — the primary keeps Postgres
# defaults.

# --- Memory ---
# shared_buffers shows up in every backend's RSS via the shared mmap, so
# keeping it modest keeps top(1) honest about real free memory.
shared_buffers = 96MB
# Planner hint: assume the OS page cache holds this much of the DB.
effective_cache_size = 384MB
# Per sort/hash op. Pricemon queries are point lookups + small range
# scans, so 2 MB is plenty.
work_mem = 2MB
# Vacuum / index builds. Rarely runs on this workload.
maintenance_work_mem = 32MB
temp_buffers = 4MB
wal_buffers = 2MB

# --- Concurrency ---
# 1 web worker + up to ~6 feed daemons + headroom for psql / vacuum.
max_connections = 30

# --- Parallelism off ---
# Pricemon queries are too small to benefit from parallel workers, and
# the workers themselves eat memory.
max_worker_processes = 4
max_parallel_workers = 2
max_parallel_workers_per_gather = 0
max_parallel_maintenance_workers = 0

# --- Autovacuum ---
# Keep on, but with fewer workers; the hot table (feeds_minutebar) is
# insert-only so vacuum is cheap.
autovacuum = on
autovacuum_max_workers = 2
